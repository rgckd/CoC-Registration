<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Successful</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
      line-height: 1.6;
    }
    h2 {
      margin-bottom: 10px;
    }
    p {
      margin: 6px 0;
      color: #333;
    }
  </style>
</head>
<body>

<h2 id="title"></h2>
<p id="line1"></p>
<p id="line2"></p>
<p id="line3"></p>
<p><strong id="line4"></strong></p>

<script>
/* -------------------------------
   Language messages
-------------------------------- */
const messages = {
  English: {
    title: "🙏 Thank you for registering!",
    line1: "Your submission has been received successfully.",
    line2: "You will receive a copy of your submission in the email address you provided.",
    line3: "If you have any questions, please contact the admin at",
    line4: "You can now close this page."
  },
  Tamil: {
    title: "🙏 பதிவு செய்ததற்கு நன்றி!",
    line1: "உங்கள் பதிவு வெற்றிகரமாக பெறப்பட்டது.",
    line2: "நீங்கள் வழங்கிய மின்னஞ்சல் முகவரிக்கு உங்கள் பதிவின் ஒரு பிரதியை அனுப்புவோம்.",
    line3: "உங்களுக்கு கேள்விகள் இருந்தால், இந்த முகவரியில் உள்ள நிர்வாகியை தொடர்பு கொள்ளவும்:",
    line4: "இப்போது இந்தப் பக்கத்தை மூடலாம்."
  },
  Hindi: {
    title: "🙏 पंजीकरण के लिए धन्यवाद!",
    line1: "आपका पंजीकरण सफलतापूर्वक प्राप्त हो गया है।",
    line2: "आपके द्वारा दिए गए ईमेल पते पर आपके पंजीकरण की एक प्रति भेजी जाएगी।",
    line3: "यदि आपके कोई प्रश्न हों, तो कृपया इस ईमेल पर एडमिन से संपर्क करें:",
    line4: "अब आप इस पेज को बंद कर सकते हैं।"
  },
  Kannada: {
    title: "🙏 ನೋಂದಾಯಿಸಿದ್ದಕ್ಕಾಗಿ ಧನ್ಯವಾದಗಳು!",
    line1: "ನಿಮ್ಮ ನೋಂದಣಿ ಯಶಸ್ವಿಯಾಗಿ ಸ್ವೀಕರಿಸಲಾಗಿದೆ.",
    line2: "ನೀವು ನೀಡಿದ ಇಮೇಲ್ ವಿಳಾಸಕ್ಕೆ ನಿಮ್ಮ ನೋಂದಣಿಯ ಪ್ರತಿಯನ್ನು ಕಳುಹಿಸಲಾಗುತ್ತದೆ.",
    line3: "ಯಾವುದೇ ಪ್ರಶ್ನೆಗಳಿದ್ದರೆ, ದಯವಿಟ್ಟು ಈ ಇಮೇಲ್‌ನಲ್ಲಿ ಆಡ್ಮಿನ್ ಅನ್ನು ಸಂಪರ್ಕಿಸಿ:",
    line4: "ಈಗ ನೀವು ಈ ಪುಟವನ್ನು ಮುಚ್ಚಬಹುದು."
  },
  Telugu: {
    title: "🙏 నమోదు చేసినందుకు ధన్యవాదాలు!",
    line1: "మీ నమోదు విజయవంతంగా స్వీకరించబడింది.",
    line2: "మీరు ఇచ్చిన ఇమెయిల్ చిరునామాకు మీ నమోదు ప్రతిని పంపిస్తాము.",
    line3: "మీకు ఏవైనా ప్రశ్నలు ఉంటే, దయచేసి ఈ ఇమెయిల్‌లో అడ్మిన్‌ను సంప్రదించండి:",
    line4: "ఇప్పుడు ఈ పేజీని మూసివేయవచ్చు."
  }
};

/* -------------------------------
   Read language from URL
-------------------------------- */
const params = new URLSearchParams(window.location.search);
const lang = params.get("lang") || "English";
let adminEmail = params.get("adminEmail") || "";
const userEmail = params.get("userEmail") || "";
const webappUrl = params.get("webapp") || "https://script.google.com/macros/s/AKfycbxPw3PzC2RVFoo1cmxknCiwZeUr_wtECxDrI-2wzfTP3LK0rttnt2EzAuPuJU-M6WniCw/exec";
const m = messages[lang] || messages.English;

/* -------------------------------
   Apply text
-------------------------------- */
const titleEl = document.getElementById("title");
const line1El = document.getElementById("line1");
const line2El = document.getElementById("line2");
const line3 = document.getElementById("line3");
const line4 = document.getElementById("line4");

function renderAdminLine(email) {
  line3.innerHTML = "";
  line3.append(`${m.line3} `);

  if (email) {
    const link = document.createElement("a");
    link.href = `mailto:${email}`;
    link.innerText = email;
    line3.appendChild(link);
  }
}

titleEl.innerText = m.title;
line1El.innerText = m.line1;
line2El.innerText = userEmail
  ? `${m.line2} (${userEmail})`
  : m.line2;
line4.innerText = m.line4;

if (adminEmail) {
  renderAdminLine(adminEmail);
} else {
  renderAdminLine("");

  const fd = new FormData();
  fd.append("action", "getAdminEmail");
  fd.append("language", lang);

  fetch(webappUrl, { method: "POST", body: fd })
    .then(r => r.json())
    .then(res => {
      const fetchedEmail = String((res && res.adminEmail) || "").trim();
      if (fetchedEmail) {
        adminEmail = fetchedEmail;
        renderAdminLine(adminEmail);
      }
    })
    .catch(() => {
      // Keep base sentence even when fallback fetch fails.
    });
}
</script>

</body>
</html>
